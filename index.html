<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
    <meta name="theme-color" content="#fff4e0" />
    <title>犬そだて</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Mochiy+Pop+P+One&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sky-1: #ffe9b8;
        --sky-2: #ffc3a0;
        --sky-3: #b5e7ff;
        --paper: #fff;
        --ink: #3a2a18;
        --accent: #ff6b35;
        --accent-2: #ffb84d;
        --green: #8ed06a;
        --pink: #ffb6c7;
        --brown: #8a5a3b;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      body {
        font-family: "Kosugi Maru", "Mochiy Pop P One", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 700px at 10% 10%, rgba(255, 183, 77, 0.45), transparent 60%),
          radial-gradient(900px 700px at 90% 95%, rgba(181, 231, 255, 0.6), transparent 60%),
          radial-gradient(700px 500px at 70% 20%, rgba(255, 192, 214, 0.4), transparent 60%),
          linear-gradient(180deg, var(--sky-1), var(--sky-3));
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      body::before {
        content: "";
        position: fixed;
        inset: -10%;
        background:
          radial-gradient(120px 70px at 20% 25%, rgba(255,255,255,0.8), transparent 70%),
          radial-gradient(150px 80px at 80% 40%, rgba(255,255,255,0.75), transparent 70%),
          radial-gradient(100px 60px at 45% 70%, rgba(255,255,255,0.7), transparent 70%);
        filter: blur(2px);
        animation: cloud 40s linear infinite alternate;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes cloud {
        from { transform: translate(-4%, -2%); }
        to   { transform: translate(4%, 2%); }
      }
      #app {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-rows: auto 1fr auto auto;
        height: 100dvh;
        max-height: 100dvh;
        padding: 10px 14px 10px;
        gap: 8px;
        max-width: 520px;
        margin: 0 auto;
      }
      header { display: flex; align-items: center; justify-content: space-between; }
      .title {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(22px, 5.5vw, 28px);
        color: var(--accent);
        -webkit-text-stroke: 3px #fff;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--ink), 5px 5px 0 var(--accent-2);
        transform: rotate(-2deg);
        margin: 0;
        letter-spacing: 0.03em;
      }
      .top-buttons { display: flex; gap: 5px; }
      .icon-btn {
        background: #fff;
        border: 3px solid var(--ink);
        color: var(--ink);
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 3px 3px 0 var(--ink);
      }
      .icon-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

      /* Stats */
      .stats {
        background: #fff;
        border: 3px solid var(--ink);
        border-radius: 16px;
        padding: 10px 12px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        box-shadow: 3px 3px 0 var(--ink);
      }
      .stats .level {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 30px;
        color: var(--accent);
        -webkit-text-stroke: 2px var(--ink);
        paint-order: stroke fill;
        line-height: 1;
      }
      .stats .level-label { font-size: 9px; color: var(--brown); letter-spacing: 0.1em; font-weight: bold; }
      .stats .exp-wrap {
        height: 10px;
        background: #f5e6d3;
        border: 2px solid var(--ink);
        border-radius: 999px;
        overflow: hidden;
      }
      .stats .exp-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-2), var(--accent));
        transition: width 0.3s;
      }
      .stats .name {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 15px;
        color: var(--ink);
        text-align: right;
        white-space: nowrap;
      }
      .gauges { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
      .gauge {
        background: #fffaef;
        border: 2px solid var(--ink);
        border-radius: 10px;
        padding: 4px 8px;
      }
      .gauge-label {
        font-size: 10px;
        color: var(--brown);
        letter-spacing: 0.1em;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-weight: bold;
      }
      .gauge-value {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 14px;
        color: var(--ink);
      }
      .gauge-track {
        height: 6px;
        background: #f5e6d3;
        border-radius: 999px;
        overflow: hidden;
        margin-top: 3px;
      }
      .gauge-fill {
        height: 100%;
        border-radius: 999px;
        transition: width 0.3s;
      }
      .gauge.hunger .gauge-fill { background: linear-gradient(90deg, #ffb84d, #ff6b35); }
      .gauge.mood .gauge-fill   { background: linear-gradient(90deg, #ffb6c7, var(--pink)); }
      .gauge.age .gauge-fill    { background: linear-gradient(90deg, #8ed06a, #5ab8ff); }

      /* Stage */
      .stage {
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        min-height: 0;
        background:
          radial-gradient(70% 40% at 50% 100%, rgba(142, 208, 106, 0.9) 0%, transparent 75%),
          radial-gradient(60% 50% at 50% 20%, rgba(255, 255, 255, 0.7) 0%, transparent 70%),
          linear-gradient(180deg, #cce7ff 0%, #a2d9a6 80%);
        border: 4px solid var(--ink);
        border-radius: 20px;
        box-shadow: 4px 4px 0 var(--ink), inset 0 0 30px rgba(255, 255, 255, 0.5);
        overflow: hidden;
      }
      .stage::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 22%;
        background: linear-gradient(180deg, #a2d9a6, #6eaf72);
        z-index: 1;
      }
      .monster-wrap {
        position: relative;
        z-index: 3;
        width: 72%;
        max-width: 300px;
        aspect-ratio: 1;
        margin-bottom: 6%;
        animation: breathe 2.4s ease-in-out infinite;
        transform-origin: center bottom;
      }
      .monster-wrap.happy  { animation: bounce 0.8s ease-in-out infinite; }
      .monster-wrap.grumpy { animation: grump 1.6s ease-in-out infinite; }
      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.025); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-14px); }
      }
      @keyframes grump {
        0%, 100% { transform: translateX(0) rotate(0); }
        25%      { transform: translateX(-4px) rotate(-1deg); }
        75%      { transform: translateX(4px) rotate(1deg); }
      }
      /* One-shot action animations override the idle state */
      .monster-wrap.act-eat    { animation: munch 0.22s ease-in-out 4; }
      .monster-wrap.act-play   { animation: hop 0.45s ease-in-out 3; }
      .monster-wrap.act-train  { animation: shake 0.12s linear 8; }
      .monster-wrap.act-praise { animation: swell 0.6s ease-out 2; }
      @keyframes munch {
        0%, 100% { transform: scaleY(1) translateY(0); }
        50%      { transform: scaleY(0.86) translateY(5px); }
      }
      @keyframes hop {
        0%   { transform: translateY(0) rotate(0); }
        40%  { transform: translateY(-30px) rotate(-8deg); }
        60%  { transform: translateY(-28px) rotate(8deg); }
        100% { transform: translateY(0) rotate(0); }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25%      { transform: translateX(-4px) rotate(-1deg); }
        75%      { transform: translateX(4px) rotate(1deg); }
      }
      @keyframes swell {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.15) translateY(-8px); }
        100% { transform: scale(1) translateY(0); }
      }
      #monster { width: 100%; height: 100%; display: block; }

      /* Speech bubble */
      .bubble {
        position: absolute;
        top: 6%;
        left: 50%;
        transform: translateX(-50%) scale(0.9);
        background: #fff;
        color: var(--ink);
        padding: 6px 14px;
        border-radius: 999px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 14px;
        border: 3px solid var(--ink);
        box-shadow: 2px 2px 0 var(--ink);
        opacity: 0;
        transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
        white-space: nowrap;
        z-index: 5;
      }
      .bubble.show { opacity: 1; transform: translateX(-50%) scale(1); }
      .bubble::after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        border: 5px solid transparent;
        border-top-color: var(--ink);
      }

      /* Floating prop emojis (food bowl / ball / etc) */
      .prop {
        position: absolute;
        font-size: 44px;
        z-index: 4;
        pointer-events: none;
        animation: propPlop 1.2s ease-out forwards;
        transform: translate(-50%, -50%);
      }
      @keyframes propPlop {
        0%   { opacity: 0; transform: translate(-50%, -160%) scale(0.6) rotate(-20deg); }
        25%  { opacity: 1; transform: translate(-50%, -60%) scale(1.15) rotate(5deg); }
        60%  { opacity: 1; transform: translate(-50%, -65%) scale(1) rotate(-3deg); }
        100% { opacity: 0; transform: translate(-50%, -70%) scale(1.1) rotate(0); }
      }

      /* Action buttons */
      .actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
      .act-btn {
        background: #fff;
        border: 3px solid var(--ink);
        color: var(--ink);
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 16px;
        padding: 13px 6px;
        border-radius: 14px;
        cursor: pointer;
        box-shadow: 3px 3px 0 var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 54px;
      }
      .act-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
      .act-btn .ico { font-size: 22px; }
      .act-btn.eat    { background: #ffe5a8; }
      .act-btn.play   { background: #ffc8d8; }
      .act-btn.train  { background: #ffcfa8; }
      .act-btn.praise { background: #d8f0a8; }

      .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .mini-btn {
        background: #fff;
        border: 2.5px solid var(--ink);
        color: var(--ink);
        font-family: "Kosugi Maru", sans-serif;
        font-size: 13px;
        padding: 8px;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 2px 2px 0 var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .mini-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }

      /* Floaters */
      #floaters { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 6; }
      .floater {
        position: absolute;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 22px;
        color: var(--accent);
        -webkit-text-stroke: 2px #fff;
        paint-order: stroke fill;
        text-shadow: 2px 2px 0 var(--ink);
        transform: translate(-50%, -50%);
        animation: floatUp 1.1s ease-out forwards;
        white-space: nowrap;
      }
      .floater.exp  { color: var(--accent); }
      .floater.love { color: #e04a78; }
      .floater.food { color: #f57c00; }
      @keyframes floatUp {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
        20%  { opacity: 1; transform: translate(-50%, -75%) scale(1.1); }
        100% { opacity: 0; transform: translate(-50%, -160%) scale(0.9); }
      }

      /* Level-up */
      #levelup {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 7;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }
      #levelup.show { animation: levelupPulse 1.6s ease-out forwards; }
      @keyframes levelupPulse {
        0%   { opacity: 0; }
        20%  { opacity: 1; }
        100% { opacity: 0; }
      }
      #levelup .flash {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.9), rgba(255,183,77,0.4) 40%, transparent 70%);
      }
      #levelup .text {
        position: relative;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(28px, 9vw, 52px);
        color: var(--accent);
        -webkit-text-stroke: 4px #fff;
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 var(--ink), 7px 7px 0 var(--accent-2);
        transform: rotate(-3deg);
        animation: levelupText 1.6s cubic-bezier(.2,.9,.2,1);
      }
      @keyframes levelupText {
        0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
        20%  { transform: scale(1.25) rotate(6deg); opacity: 1; }
        40%  { transform: scale(0.95) rotate(-3deg); }
        100% { transform: scale(1) rotate(-3deg); opacity: 0; }
      }

      /* Evolution */
      #evolve {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 8;
        opacity: 0;
      }
      #evolve.show { animation: evolveBg 2.4s ease-out forwards; }
      #evolve .stripes {
        position: absolute;
        left: -120%;
        top: 0;
        width: 240%;
        height: 100%;
        background: repeating-linear-gradient(
          -15deg,
          rgba(255, 183, 77, 0.7) 0 40px,
          rgba(255, 107, 53, 0.6) 40px 80px,
          rgba(255, 255, 255, 0.7) 80px 120px
        );
        transform: skewX(-8deg);
        opacity: 0;
      }
      #evolve.show .stripes { animation: stripesSweep 2.2s cubic-bezier(.2,.7,.2,1) forwards; }
      #evolve .text {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(32px, 10vw, 60px);
        color: #fff;
        -webkit-text-stroke: 5px var(--ink);
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 var(--accent), 8px 8px 0 var(--accent-2);
        letter-spacing: 0.02em;
        opacity: 0;
      }
      #evolve.show .text { animation: evolveText 2s cubic-bezier(.2,.9,.2,1) forwards; }
      @keyframes evolveBg {
        0%   { opacity: 0; }
        15%  { opacity: 1; }
        85%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes stripesSweep {
        0%   { left: -120%; opacity: 0; }
        15%  { opacity: 1; }
        85%  { opacity: 1; }
        100% { left: 120%; opacity: 0; }
      }
      @keyframes evolveText {
        0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
        20%  { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        40%  { transform: translate(-50%, -50%) scale(0.95); }
        90%  { opacity: 1; }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
      }

      /* Overlay */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(3px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 24px;
      }
      .overlay.show { display: flex; }
      .overlay .box {
        background: #fff;
        color: var(--ink);
        border: 4px solid var(--ink);
        border-radius: 18px;
        padding: 24px 26px;
        text-align: center;
        box-shadow: 6px 6px 0 var(--ink);
        transform: rotate(-1deg);
        max-width: 340px;
      }
      .overlay h2 {
        font-family: "Mochiy Pop P One", sans-serif;
        margin: 0 0 6px;
        font-size: 30px;
        color: var(--accent);
        -webkit-text-stroke: 3px #fff;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--ink);
      }
      .overlay p { font-size: 14px; margin: 6px 0; line-height: 1.5; }
      .overlay input {
        width: 100%;
        font-size: 18px;
        font-family: "Mochiy Pop P One", sans-serif;
        text-align: center;
        border: 3px solid var(--ink);
        border-radius: 10px;
        padding: 10px;
        margin: 12px 0;
      }
      .overlay button {
        background: var(--accent);
        color: #fff;
        border: 3px solid var(--ink);
        border-radius: 999px;
        padding: 12px 28px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 4px 4px 0 var(--ink);
        animation: btnPulse 1.4s ease-in-out infinite;
      }
      .overlay button:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 var(--ink); }
      @keyframes btnPulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.05); }
      }

      /* Monster image (preferred) overlays the fallback SVG */
      #monster-img {
        width: 100%;
        height: 100%;
        display: none;
        object-fit: contain;
      }
      .monster-wrap.has-image #monster { display: none; }
      .monster-wrap.has-image #monster-img { display: block; }

      /* Design picker modal */
      .design-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin: 12px 0 4px;
      }
      .design-card {
        border: 3px solid var(--ink);
        border-radius: 12px;
        padding: 8px 6px;
        background: #fff;
        text-align: center;
        cursor: pointer;
        box-shadow: 2px 2px 0 var(--ink);
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 14px;
        transition: transform 0.08s;
      }
      .design-card:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }
      .design-card.selected {
        background: #fff6d0;
        border-color: var(--accent);
        box-shadow: 3px 3px 0 var(--accent);
      }
      .design-card .thumb {
        width: 100%;
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #e8f7ff, #cfe8c7);
        border-radius: 8px;
        margin-bottom: 4px;
        overflow: hidden;
      }
      .design-card .thumb img {
        width: 92%;
        height: 92%;
        object-fit: contain;
      }
      .design-card .thumb-fallback {
        font-size: 34px;
        color: var(--brown);
        opacity: 0.6;
      }
      .design-card.missing {
        opacity: 0.65;
      }
      .design-card.missing .thumb { filter: grayscale(1); }
      .design-card .missing-tag {
        display: inline-block;
        background: #ffe1a8;
        color: var(--brown);
        border: 2px solid var(--ink);
        border-radius: 999px;
        padding: 0 6px;
        font-size: 10px;
        margin-top: 2px;
      }
      .overlay .box.wide { max-width: 380px; padding: 20px 22px; }
      .overlay .box p.hint {
        font-size: 11px;
        color: var(--brown);
        background: #fff7e0;
        border: 2px dashed var(--brown);
        border-radius: 8px;
        padding: 6px;
        margin: 8px 0 4px;
        text-align: left;
        line-height: 1.45;
      }
      .overlay .row-buttons {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 10px;
      }
      .overlay .row-buttons button { animation: none; padding: 10px 20px; font-size: 15px; }
      .overlay .row-buttons button.secondary { background: #fff; color: var(--ink); }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1 class="title">犬そだて</h1>
        <div class="top-buttons">
          <button id="btn-mute" class="icon-btn" aria-label="mute">🔊</button>
          <button id="btn-reset" class="icon-btn" aria-label="reset">↺</button>
        </div>
      </header>

      <div class="stage">
        <div class="monster-wrap" id="monster-wrap">
          <svg id="monster" viewBox="0 0 200 200"></svg>
          <img id="monster-img" alt="" />
        </div>
        <div class="bubble" id="bubble"></div>
        <div id="floaters"></div>
        <div id="levelup"><div class="flash"></div><div class="text">LEVEL UP!</div></div>
        <div id="evolve"><div class="stripes"></div><div class="text" id="evolve-text">進化！</div></div>
      </div>

      <div class="stats">
        <div>
          <div class="level-label">LV</div>
          <div class="level" id="lv">1</div>
        </div>
        <div>
          <div class="exp-wrap"><div class="exp-bar" id="exp-bar" style="width:0%"></div></div>
          <div class="gauges" style="margin-top:8px">
            <div class="gauge hunger">
              <div class="gauge-label">食欲 <span class="gauge-value" id="hunger-val">50</span></div>
              <div class="gauge-track"><div class="gauge-fill" id="hunger-bar" style="width:50%"></div></div>
            </div>
            <div class="gauge mood">
              <div class="gauge-label">きげん <span class="gauge-value" id="mood-val">80</span></div>
              <div class="gauge-track"><div class="gauge-fill" id="mood-bar" style="width:80%"></div></div>
            </div>
            <div class="gauge age">
              <div class="gauge-label">日数 <span class="gauge-value" id="age-val">0</span></div>
              <div class="gauge-track"><div class="gauge-fill" id="age-bar" style="width:0%"></div></div>
            </div>
          </div>
        </div>
        <div>
          <div class="level-label">NAME</div>
          <div class="name" id="name">—</div>
        </div>
      </div>

      <div class="actions">
        <button class="act-btn eat"    data-act="eat"><span class="ico">🍖</span>ごはん</button>
        <button class="act-btn play"   data-act="play"><span class="ico">🎾</span>あそぶ</button>
        <button class="act-btn train"  data-act="train"><span class="ico">🦴</span>しつけ</button>
        <button class="act-btn praise" data-act="praise"><span class="ico">💕</span>なでる</button>
      </div>

      <div class="bottom-row">
        <button class="mini-btn" id="btn-design">🎨 デザイン</button>
        <button class="mini-btn" id="btn-rename">🪶 名前をかえる</button>
        <button class="mini-btn" id="btn-share">🔗 じまんする</button>
      </div>
    </div>

    <!-- Design picker -->
    <div class="overlay" id="design-overlay">
      <div class="box wide">
        <h2>キャラデザ</h2>
        <p>お好みの犬種を選んでね</p>
        <div class="design-grid" id="design-grid"></div>
        <p class="hint" id="design-hint">
          画像がない犬種は SVG で表示されます。<br/>
          画像を追加するには <code>assets/designs/&lt;id&gt;/stage-0.png 〜 stage-4.png</code> を配置してください。
        </p>
        <div class="row-buttons">
          <button class="secondary" id="btn-design-close">閉じる</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="start-overlay">
      <div class="box">
        <h2>犬そだて</h2>
        <p>子犬を拾った。<br/>ごはん・あそぶ・しつけ・なでる、の4操作。<br/>立派な犬に育てよう。</p>
        <input id="start-name" maxlength="10" placeholder="犬の名前" value="ポチ" />
        <br/>
        <button id="btn-start">はじめる</button>
      </div>
    </div>

    <div class="overlay" id="death-overlay">
      <div class="box">
        <h2>さようなら…</h2>
        <p id="death-msg">ずっとほうって置いてたから、犬は旅立った…</p>
        <button id="btn-restart">新しい子を拾う</button>
      </div>
    </div>

    <script src="inu.js" defer></script>
  </body>
</html>
